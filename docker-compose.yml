services:
  # ============================
  # DATABASE — PostgreSQL
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: booking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_booking
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d smart_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # BACKEND — Node.js / Express
  # ============================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking_backend
    restart: unless-stopped
    environment:
      FRONTEND_URL: "*"
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_booking
      DB_USER: booking_user
      DB_PASSWORD: booking_pass_2024
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      JWT_EXPIRES_IN: 7d
    ports:
      - "3000:3000"   # Port gốc cho backend
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # ============================
  # REVERSE PROXY — Nginx
  # ============================
  nginx:
    image: nginx:alpine
    container_name: booking_nginx
    restart: unless-stopped
    ports:
      - "8080:80"     # Frontend chạy trên port 9090
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local