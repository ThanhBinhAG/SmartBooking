<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt Phòng — SmartBook</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Three.js từ CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div class="room-detail-layout">
    <div class="room-hero-panel">
      <section class="preview-hero" id="room-hero" style="display:none;">
        <div class="preview-hero-content">
          <h1 id="room-hero-title"></h1>
          <p id="room-hero-caption"></p>
        </div>
      </section>
    </div>

    <!-- Thông tin phòng và đặt phòng -->
    <div class="info-panel" id="room-info">
      <div id="room-gallery" style="margin-bottom:20px;"></div>
      <div class="loading">⏳ Đang tải...</div>
    </div>

    <!-- Phần đặt phòng -->
    <div class="booking-panel" id="booking-panel" style="display:none;">
      <h3>📅 Đặt Phòng</h3>

      <!-- Chọn thời gian -->
      <div class="booking-section">
        <h4>⏰ Chọn Thời Gian</h4>
        <div class="time-inputs">
          <div class="input-group">
            <label for="booking-start">Thời gian bắt đầu:</label>
            <input type="datetime-local" id="booking-start" required>
          </div>
          <div class="input-group">
            <label for="booking-end">Thời gian kết thúc:</label>
            <input type="datetime-local" id="booking-end" required>
          </div>
        </div>
      </div>

      <!-- Chọn thiết bị -->
      <div id="equipment-section" class="booking-section">
        <h4>🛠️ Thiết Bị (Tùy chọn)</h4>
        <div id="equipment-note" class="equipment-note hidden">
          Thiết bị sẽ được chọn sau khi bạn chọn phòng và thời gian.
        </div>
        <div id="equipment-list" class="equipment-grid">
          <!-- Equipment items sẽ được load vào đây -->
        </div>
      </div>

      <!-- Tóm tắt đơn hàng -->
      <div class="booking-section">
        <h4>💰 Tóm Tắt</h4>
        <div class="price-breakdown">
          <div class="price-row">
            <span>Phòng họp:</span>
            <span id="room-price-display">0 VND</span>
          </div>
          <div class="price-row">
            <span>Thiết bị:</span>
            <span id="equipment-price-display">0 VND</span>
          </div>
          <div class="price-row total">
            <span><strong>Tổng cộng:</strong></span>
            <span id="total-price-display"><strong>0 VND</strong></span>
          </div>
        </div>
      </div>

      <!-- Ghi chú -->
      <div class="booking-section">
        <h4>📝 Ghi chú (Tùy chọn)</h4>
        <textarea id="booking-notes" placeholder="Nhập ghi chú cho đơn đặt phòng..."></textarea>
      </div>

      <!-- Nút đặt phòng -->
      <div class="booking-actions">
        <button class="btn-primary" onclick="BookingManager.confirm()">
          🛒 Xác Nhận Đặt Phòng
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/booking.js"></script>
  <script src="/js/room3d.js"></script>
</body>
</html>
