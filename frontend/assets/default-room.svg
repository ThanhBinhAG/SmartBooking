<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>
  <g transform="translate(50, 50)">
    <!-- Room icon -->
    <rect x="50" y="30" width="200" height="140" fill="none" stroke="white" stroke-width="3" rx="5"/>
    <!-- Door -->
    <rect x="70" y="140" width="40" height="30" fill="none" stroke="white" stroke-width="2"/>
    <!-- Window 1 -->
    <rect x="100" y="50" width="35" height="35" fill="none" stroke="white" stroke-width="1"/>
    <line x1="117.5" y1="50" x2="117.5" y2="85" stroke="white" stroke-width="1"/>
    <line x1="100" y1="67.5" x2="135" y2="67.5" stroke="white" stroke-width="1"/>
    <!-- Window 2 -->
    <rect x="185" y="50" width="35" height="35" fill="none" stroke="white" stroke-width="1"/>
    <line x1="202.5" y1="50" x2="202.5" y2="85" stroke="white" stroke-width="1"/>
    <line x1="185" y1="67.5" x2="220" y2="67.5" stroke="white" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="200" y="270" font-size="20" fill="white" text-anchor="middle" font-family="Arial, sans-serif">
    Phòng Họp
  </text>
  <text x="200" y="295" font-size="14" fill="white" text-anchor="middle" font-family="Arial, sans-serif" opacity="0.8">
    Smart Booking
  </text>
</svg>